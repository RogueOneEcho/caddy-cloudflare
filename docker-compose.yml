services:

  caddy:
    container_name: caddy
    image: ghcr.io/rogueoneecho/caddy-cloudflare
    ports:
    - "80:80"
    - "443:443"
    - "443:443/udp"
    volumes:
    - /srv/caddy/data:/data/caddy
    - /srv/caddy/config:/config/caddy
    env_file:
    - .env
    networks:
    - default
    - public
    healthcheck:
      test: curl --fail http://localhost/healthcheck || exit 1
    restart: unless-stopped

networks:
  public:
    external: true
